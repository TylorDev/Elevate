appId: com.tylordev.elevate
productName: Elevate
copyright: '(c) 2026 TylorDev. All rights reserved.'
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!node_modules/node-audio-volume-mixer/build/Release/obj/**'
  - '!node_modules/node-audio-volume-mixer/build/Release/*.exp'
  - '!node_modules/node-audio-volume-mixer/build/Release/*.lib'
  - '!node_modules/node-audio-volume-mixer/build/Release/*.iobj'
  - '!node_modules/node-audio-volume-mixer/build/Release/*.ipdb'
asarUnpack:
  - resources/**
  - '**/*.node'
  - node_modules/@libsql/**/*
  - node_modules/libsql/**/*
  - node_modules/@img/sharp-*/**/*
  - node_modules/sharp/**/*
  - node_modules/node-audio-volume-mixer/build/Release/addon.node
win:
  executableName: elevate
  icon: build/elevate.ico
  extraResources:
    - from: build/redist/vc_redist.x64.exe
      to: redist/vc_redist.x64.exe
nsis:
  include: build/installer.nsh
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  uninstallUrlHelp: https://github.com/TylorDev/Elevate
  uninstallUrlInfoAbout: https://github.com/TylorDev/Elevate
  uninstallUrlUpdateInfo: https://github.com/TylorDev/Elevate/releases
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: TylorDev
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: github
  owner: TylorDev
  repo: Elevate
  releaseType: draft
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
extraResources:
  - from: prisma
    to: prisma
    filter:
      - "**/*"
      - "!dev.db"
      - "!dev.db-journal"
      - "!dev.db-shm"
      - "!dev.db-wal"
      - "!migrations/**"
  - src/main/generated/prisma/**/*
